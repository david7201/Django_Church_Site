name: Django tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "True"
      SECRET_KEY: django-insecure-ci-only-secret-key
      ADMIN_SECRET: local-admin-development-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Django configuration
        run: python manage.py check
      - name: Run tests
        run: python manage.py test --noinput
      - name: Check production security configuration
        env:
          DEBUG: "False"
          SECRET_KEY: ci-only-production-check-secret-key-with-more-than-fifty-characters-123
          ADMIN_SECRET: ci-only-random-admin-route-value-with-at-least-forty-characters
          ALLOWED_HOSTS: example.com
          CSRF_TRUSTED_ORIGINS: https://example.com
          SITE_URL: https://example.com
          DATABASE_URL: postgresql://user:password@localhost:5432/database
          EMAIL_HOST_USER: ci-user
          EMAIL_HOST_PASSWORD: ci-password
        run: python manage.py check --deploy
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit==2.10.0
          python -m pip_audit -r requirements.txt
