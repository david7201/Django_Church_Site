{% extends "base.html" %}
{% load church_extras %}

{% block content %}
    <section class="auth-section">
        <div class="container px-4 px-lg-5">
            <div class="auth-card">
                <h1>{% ui "reset_password" %}</h1>
                <p class="text-black-50">{% ui "reset_password_intro" %}</p>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form.visible_fields %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">{% ui "send_reset_link" %}</button>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
