services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
      - media:/code/media
    ports:
      - "8000:8000"
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mount_zion
      POSTGRES_USER: mount_zion
      POSTGRES_PASSWORD: mount_zion_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mount_zion -d mount_zion"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  media:
